<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>ZAAM-ASISTEN | Intelligent AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --accent: #3b82f6;
            --text-main: #f1f5f9;
            --glass: rgba(30, 41, 59, 0.7);
        }

        body {
            margin: 0; font-family: 'Inter', sans-serif;
            background: var(--bg-dark); color: var(--text-main);
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        /* --- STYLES PERKENALAN (SPLASH SCREEN) --- */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark); display: flex; justify-content: center;
            align-items: center; z-index: 1000; transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .splash-content { text-align: center; }
        
        .logo-text {
            font-size: 3rem; font-weight: 800; letter-spacing: 3px;
            background: linear-gradient(90deg, #3b82f6, #60a5fa, #ffffff, #3b82f6);
            background-size: 200% auto; -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; animation: shine 3s linear infinite;
            margin: 15px 0;
        }

        @keyframes shine { to { background-position: 200% center; } }
        .hide-splash { opacity: 0; visibility: hidden; transform: scale(1.1); }

        /* --- LAYOUT UTAMA --- */
        header {
            background: var(--glass); backdrop-filter: blur(15px);
            padding: 15px; text-align: center; font-weight: 600;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: center; gap: 10px;
            z-index: 10;
        }

        #chat {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 15px;
            scroll-behavior: smooth;
            padding-bottom: 40px;
        }

        /* --- BUBBLE CHAT (Update: Fix Teks Terpotong) --- */
        .msg {
            padding: 12px 18px; border-radius: 20px; max-width: 85%;
            line-height: 1.6; font-size: 14px; position: relative;
            word-wrap: break-word;        /* Memaksa teks panjang turun baris */
            overflow-wrap: break-word;    /* Standar modern untuk break word */
            height: auto;                 /* Pastikan tinggi otomatis */
            white-space: pre-wrap;        /* Menjaga format baris baru dari AI */
            animation: messagePop 0.4s ease-out forwards;
        }

        @keyframes messagePop {
            from { opacity: 0; transform: translateY(10px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .user { background: var(--accent); align-self: flex-end; border-bottom-right-radius: 4px; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3); }
        .bot { background: var(--card-bg); align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid rgba(255,255,255,0.05); }

        /* Media */
        .chat-img { max-width: 100%; border-radius: 12px; margin-top: 8px; border: 1px solid rgba(255,255,255,0.2); display: block; }
        .file-attachment { display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.2); padding: 12px; border-radius: 12px; margin-top: 8px; }

        /* --- TYPING INDICATOR --- */
        .typing { display: flex; gap: 5px; padding: 15px; width: fit-content; align-items: center; }
        .dot { width: 8px; height: 8px; background: #94a3b8; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-8px); } }

        /* --- INPUT AREA --- */
        #inputWrapper { background: var(--glass); backdrop-filter: blur(10px); padding: 15px 20px; border-top: 1px solid rgba(255,255,255,0.1); }
        
        #previewBar { 
            display: none; padding: 12px; background: var(--card-bg); border-radius: 15px; 
            margin-bottom: 15px; border-left: 5px solid var(--accent);
        }

        #inputArea {
            max-width: 900px; margin: 0 auto; display: flex; 
            background: #0f172a; padding: 8px 15px;
            border-radius: 35px; align-items: center; gap: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        input[type="text"] { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 15px; padding: 8px 0; }
        #fileInput { display: none; }
        .btn-icon { color: #94a3b8; cursor: pointer; font-size: 1.3rem; transition: 0.3s; display: flex; align-items: center; }
        .btn-icon:hover { color: var(--accent); transform: rotate(15deg); }
        
        #sendBtn { 
            background: var(--accent); border: none; color: white; 
            width: 40px; height: 40px; border-radius: 50%; 
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: 0.3s; flex-shrink: 0;
        }
        #sendBtn:hover { transform: scale(1.1); box-shadow: 0 0 15px var(--accent); }
        #sendBtn:disabled { background: #475569; cursor: not-allowed; transform: none; box-shadow: none; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>

<div id="splash">
    <div class="splash-content">
        <i class="fas fa-robot fa-4x" style="color: #3b82f6; margin-bottom: 20px;"></i>
        <h1 class="logo-text">ZAAM-ASISTEN</h1>
        <div class="typing" style="margin: 0 auto;"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    </div>
</div>

<header>
    <i class="fas fa-microchip" style="color:var(--accent)"></i> 
    ZAAM-ASISTEN AI
</header>

<div id="chat">
    <div class="msg bot">Halo! Saya <b>ZAAM-ASISTEN</b>. <br>Saya siap membantu Anda menganalisis teks, gambar, atau dokumen. Apa yang bisa saya lakukan hari ini?</div>
</div>

<div id="inputWrapper">
    <div id="previewBar">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <span id="fileName" style="font-size:13px; font-weight:600; color:var(--accent)"></span>
            <i class="fas fa-circle-xmark" style="cursor:pointer; color:#ef4444" onclick="clearFile()"></i>
        </div>
        <img id="imgPreview" src="" style="display:none; max-height:100px; border-radius:8px; margin-top:10px; border: 1px solid #334155;">
    </div>

    <div id="inputArea">
        <label for="fileInput" class="btn-icon" title="Lampirkan File/Gambar">
            <i class="fas fa-paperclip"></i>
        </label>
        <input type="file" id="fileInput" onchange="handleFileSelect(this)">
        
        <input type="text" id="textInput" placeholder="Ketik pesan di sini..." autocomplete="off">
        
        <button id="sendBtn" onclick="send()" title="Kirim">
            <i class="fas fa-paper-plane"></i>
        </button>
    </div>
</div>

<script>
let history = [];
let selectedFile = { base64: null, name: null, type: null };

// LOGIKA SPLASH SCREEN
window.onload = () => {
    setTimeout(() => {
        const splash = document.getElementById('splash');
        if(splash) splash.classList.add('hide-splash');
    }, 3000); 
};

// HANDLING FILE & PREVIEW
function handleFileSelect(input) {
    const file = input.files[0];
    if (!file) return;

    selectedFile.name = file.name;
    selectedFile.type = file.type;

    const reader = new FileReader();
    reader.onload = function(e) {
        selectedFile.base64 = e.target.result;
        document.getElementById("previewBar").style.display = "block";
        document.getElementById("fileName").innerText = "📎 " + file.name;
        
        if (file.type.startsWith("image/")) {
            document.getElementById("imgPreview").src = e.target.result;
            document.getElementById("imgPreview").style.display = "block";
        } else {
            document.getElementById("imgPreview").style.display = "none";
        }
    };
    reader.readAsDataURL(file);
}

function clearFile() {
    selectedFile = { base64: null, name: null, type: null };
    document.getElementById("previewBar").style.display = "none";
    document.getElementById("fileInput").value = "";
}

// UI MESSAGES
function addMessage(content, type, isFile = false) {
    const chat = document.getElementById("chat");
    const div = document.createElement("div");
    div.className = "msg " + type;
    
    if (isFile) {
        if (selectedFile.type && selectedFile.type.startsWith("image/")) {
            div.innerHTML = `<small style="opacity:0.7; display:block; margin-bottom:5px;">Gambar dikirim:</small><img src="${content}" class="chat-img">`;
        } else {
            div.innerHTML = `<div class="file-attachment"><i class="fas fa-file-alt fa-2x" style="color:var(--accent)"></i> <div><small style="opacity:0.7">Dokumen:</small><br><b>${selectedFile.name}</b></div></div>`;
        }
    } else {
        div.innerText = content;
    }
    
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
    const chat = document.getElementById("chat");
    const div = document.createElement("div");
    div.id = "typing-loader";
    div.className = "msg bot typing";
    div.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

// FUNGSI KIRIM PESAN
async function send() {
    const textInput = document.getElementById("textInput");
    const sendBtn = document.getElementById("sendBtn");
    const text = textInput.value.trim();

    if (!text && !selectedFile.base64) return;

    // Simpan data file sebelum dihapus dari preview
    const filePayload = { ...selectedFile };
    
    // Tampilkan di UI
    if (filePayload.base64) addMessage(filePayload.base64, "user", true);
    if (text) addMessage(text, "user");

    // Reset Input
    textInput.value = "";
    clearFile();
    showTyping();
    sendBtn.disabled = true;

    try {
        const res = await fetch("/api/otax", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                message: text,
                image: filePayload.type?.startsWith("image/") ? filePayload.base64 : null,
                file: (filePayload.base64 && !filePayload.type?.startsWith("image/")) ? filePayload.base64 : null,
                history: history
            })
        });

        if (!res.ok) throw new Error("Gagal mengambil data dari API");

        const data = await res.json();
        
        const loader = document.getElementById("typing-loader");
        if(loader) loader.remove();

        if (data.reply) {
            addMessage(data.reply, "bot");
            // Simpan ke history chat
            history.push({ role: "user", content: text || "Mengirim lampiran" });
            history.push({ role: "assistant", content: data.reply });
        } else {
            addMessage("Maaf, terjadi kesalahan saat memproses jawaban.", "bot");
        }

    } catch (e) {
        console.error(e);
        const loader = document.getElementById("typing-loader");
        if(loader) loader.remove();
        addMessage("Maaf, ZAAM-ASISTEN sedang mengalami gangguan koneksi. Pastikan API Key sudah benar di Vercel.", "bot");
    } finally {
        sendBtn.disabled = false;
        textInput.focus();
    }
}

// ENTER KEY SUPPORT
document.getElementById("textInput").addEventListener("keypress", (e) => {
    if (e.key === "Enter") send();
});
</script>

</body>
</html>
